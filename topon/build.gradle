//    api "com.anythink.sdk:adapter-mintegral-nonchina:6.2.98"
//    api "com.mbridge.msdk.oversea:reward:16.6.21"
//    api "com.mbridge.msdk.oversea:newinterstitial:16.6.21"
//    api "com.mbridge.msdk.oversea:mbnative:16.6.21"
//    api "com.mbridge.msdk.oversea:mbnativeadvanced:16.6.21"
//    api "com.mbridge.msdk.oversea:mbsplash:16.6.21"
//    api "com.mbridge.msdk.oversea:mbbanner:16.6.21"
//    api "com.mbridge.msdk.oversea:mbbid:16.6.21"
//    api "androidx.recyclerview:recyclerview:1.1.0"
