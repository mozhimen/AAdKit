plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.mozhimen.adk.topon'
    compileSdk 35

    defaultConfig {
        minSdk 19
        multiDexEnabled true

        ndk {
            abiFilters 'armeabi-v7a', 'x86'
        }

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        consumerProguardFiles "consumer-rules.pro"
    }

    buildTypes {
        release {
            minifyEnabled false
//            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = '1.8'
    }
}

dependencies {
    api project(project.path.replace(project.name, '') + ':basic')
    if (getGradle().getStartParameter().getTaskRequests().toString().contains("mainland")) {
        api project(project.path.replace(project.name, '') +':topon-mainland')
    } else {
        api project(project.path.replace(project.name, '') +':topon-oversea')
    }
    api fileTree(include: ['*.jar', '*.aar'], dir: 'libs')

    //

    implementation 'com.github.mozhimen.ASwiftKit:basick:2.1.6'
    implementation 'com.github.mozhimen.ASwiftKit:xmlk:2.1.6'
    implementation 'com.github.mozhimen.AStackKit:callback:0.0.1'
    implementation 'com.github.mozhimen.AWebKit:basic:0.0.1'

    api 'com.github.mozhimen.ALibKit_Google:android_ump-user_messaging_platform:0.0.5'

    //Androidx (Necessary)
    api "androidx.appcompat:appcompat:1.1.0"
    api "androidx.browser:browser:1.4.0"

//    //UnityAds
//    api "com.anythink.sdk:adapter-unityads:6.2.98"
//    api "com.unity3d.ads:unity-ads:4.9.2"
//
